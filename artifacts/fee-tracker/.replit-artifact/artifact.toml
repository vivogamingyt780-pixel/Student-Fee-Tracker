kind = "web"
previewPath = "/"
title = "Student Fee Tracker"
version = "1.0.0"
id = "artifacts/fee-tracker"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 20222

[services.development]
run = "pnpm --filter @workspace/fee-tracker run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/fee-tracker", "run", "build" ]
publicDir = "artifacts/fee-tracker/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "20222"
BASE_PATH = "/"
